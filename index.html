<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RunMonitor Master Edition</title>
    
    <!-- Librerías de Alto Rendimiento -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0e14; color: #f8fafc; overflow-x: hidden; }
        
        /* Diseño Industrial Glassmorphism */
        .glass { background: rgba(22, 26, 35, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden { display: none !important; }
        
        /* Inputs Estilo Lovable */
        input { background: #161a23 !important; border: 1px solid #1e293b !important; outline: none; color: white; transition: 0.3s; }
        input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        
        /* Animaciones */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- 1. PANTALLA DE CARGA (PROTEGIDA) -->
    <div id="p-loader" class="fixed inset-0 z-[100] bg-[#0b0e14] flex flex-col items-center justify-center">
        <div class="p-5 bg-blue-600 rounded-[2rem] animate-bounce shadow-2xl shadow-blue-500/20">
            <i data-lucide="bolt" class="text-white w-12 h-12"></i>
        </div>
        <p class="mt-6 text-slate-500 font-bold tracking-[0.3em] text-[10px] uppercase">Sincronizando Nube</p>
    </div>

    <!-- 2. SECCIÓN DE AUTENTICACIÓN (DISEÑO BASE PROTEGIDO) -->
    <div id="scr-auth" class="hidden min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm fade-in">
            <h1 class="text-5xl font-black mb-1 tracking-tighter italic text-white italic">Run<span class="text-blue-500">Monitor</span></h1>
            <p id="auth-tag" class="text-slate-600 mb-10 text-[10px] font-bold uppercase tracking-[0.2em]">Sistemas de Control</p>

            <div class="glass p-8 rounded-[45px] space-y-5 text-left shadow-2xl border border-white/5">
                
                <!-- Campo Empresa (Solo para Registro) -->
                <div id="group-empresa" class="hidden">
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-2 mb-1 block tracking-widest">Nombre de Empresa</label>
                    <input type="text" id="val-empresa" class="w-full p-4 rounded-2xl text-sm" placeholder="Ej: Camaronera Master">
                </div>

                <!-- Correo -->
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-2 mb-1 block tracking-widest">Correo Electrónico</label>
                    <input type="email" id="val-email" class="w-full p-4 rounded-2xl text-sm" placeholder="tu@correo.com">
                </div>

                <!-- Contraseña con Ojo -->
                <div id="group-pass">
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-2 mb-1 block tracking-widest">Contraseña</label>
                    <div class="relative">
                        <input type="password" id="val-pass" class="w-full p-4 rounded-2xl text-sm">
                        <button onclick="toggleVisualizacionClave()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-600 hover:text-blue-500">
                            <i data-lucide="eye" id="ojo-icon" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <!-- BOTÓN DE ACCIÓN -->
                <button onclick="procesarAccion()" id="btn-master" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-white shadow-xl shadow-blue-600/20 uppercase tracking-widest text-[11px] transition-all active:scale-95">
                    Iniciar Sesión
                </button>

                <!-- AYUDAS Y MODOS -->
                <div class="text-center pt-2 space-y-4">
                    <p onclick="cambiarModo('registro')" id="btn-modo-reg" class="text-[11px] text-blue-400 font-black cursor-pointer hover:underline uppercase tracking-tighter">¿Registrar Empresa Nueva?</p>
                    <p onclick="cambiarModo('olvido')" id="btn-modo-forgot" class="text-[9px] text-slate-600 cursor-pointer font-black uppercase tracking-widest hover:text-slate-400">Olvidé mi contraseña</p>
                    <p onclick="window.location.reload()" id="btn-volver" class="hidden text-[11px] text-slate-400 font-black underline cursor-pointer uppercase tracking-widest">Volver al inicio</p>
                </div>
