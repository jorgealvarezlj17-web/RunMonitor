<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RunMonitor Pro</title>
    
    <!-- Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0e14; color: #f8fafc; overflow: hidden; }
        .glass { background: rgba(22, 26, 35, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden { display: none !important; }
        input:focus { border-color: #3b82f6 !important; background: rgba(30, 41, 59, 0.8) !important; }
    </style>
</head>
<body>

    <!-- 1. PANTALLA DE CARGA (Failsafe 2 seg) -->
    <div id="pantalla-carga" class="fixed inset-0 z-[100] bg-[#0b0e14] flex flex-col items-center justify-center">
        <div class="p-4 bg-blue-600 rounded-3xl animate-bounce shadow-2xl shadow-blue-500/20">
            <i data-lucide="bolt" class="text-white w-10 h-10"></i>
        </div>
        <p class="mt-4 text-slate-500 text-[10px] uppercase font-bold tracking-widest">Sincronizando...</p>
    </div>

    <!-- 2. SECCIÓN DE ACCESO (Login / Registro / Olvido) -->
    <div id="seccion-auth" class="hidden min-h-screen flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-5xl font-black mb-1 tracking-tighter italic">Run<span class="text-blue-500">Monitor</span></h1>
            <p id="auth-sub" class="text-slate-500 mb-8 text-[10px] font-bold uppercase tracking-[0.2em]">Gestión Industrial</p>

            <div class="glass p-8 rounded-[40px] space-y-4 text-left shadow-2xl">
                
                <!-- Campo Nombre Empresa (Solo Registro) -->
                <div id="div-nombre-emp" class="hidden">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 mb-1 block">Nombre de Empresa</label>
                    <input type="text" id="reg-empresa" class="w-full bg-[#161a23] border border-slate-800 p-4 rounded-2xl text-white outline-none" placeholder="Ej: Minera Norte">
                </div>

                <!-- Email -->
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 mb-1 block">Correo Electrónico</label>
                    <input type="email" id="email" class="w-full bg-[#161a23] border border-slate-800 p-4 rounded-2xl text-white outline-none" placeholder="tu@correo.com">
                </div>

                <!-- Password con Ojo -->
                <div id="div-pass">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 mb-1 block">Contraseña</label>
                    <div class="relative">
                        <input type="password" id="pass" class="w-full bg-[#161a23] border border-slate-800 p-4 rounded-2xl text-white outline-none">
                        <button onclick="toggleOjo()" class="absolute right-4 top-1/2 -translate-y-1/2 mt-0.5 text-slate-600">
                            <i data-lucide="eye" id="icono-ojo" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button onclick="ejecutarAccion()" id="btn-main" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-white shadow-xl shadow-blue-600/20 uppercase tracking-widest text-xs">Iniciar Sesión</button>

                <!-- AYUDA Y MODOS -->
                <div class="text-center pt-2 space-y-3">
                    <p onclick="cambiarModo('registro')" id="link-registro" class="text-xs text-blue-400 font-bold cursor-pointer">¿Nueva Empresa? Regístrate</p>
                    <p onclick="cambiarModo('olvido')" id="link-olvido" class="text-[10px] text-slate-600 cursor-pointer uppercase font-bold tracking-tighter">Olvidé mi contraseña</p>
                    <p onclick="location.reload()" id="link-volver" class="hidden text-xs text-slate-400 font-bold cursor-pointer underline">Volver</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. PANTALLA DASHBOARD (PARA JORGE Y ADMINS) -->
    <div id="seccion-dash" class="hidden min-h-screen flex flex-col p-6">
        <header class="flex justify-between items-center mb-10">
            <h2 class="font-black text-blue-500 uppercase text-xs tracking-widest">Panel Activo</h2>
            <button onclick="cerrarSesion()" class="text-red-500"><i data-lucide="power"></i></button>
        </header>
        <div class="bg-emerald-500/10 p-10 rounded-[40px] border border-emerald-500/20 text-center">
            <i data-lucide="check-circle" class="w-12 h-12 text-emerald-500 mx-auto mb-4"></i>
            <h3 class="text-2xl font-black text-white">Acceso Exitoso</h3>
            <p id="txt-bienvenida" class="text-slate-400 text-sm mt-2">Bienvenido Dueño</p>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN SIN ERRORES ---
        var _URL = "https://yfsyeziyhlmzrsphefss.supabase.co".trim();
        var _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlmc3lleml5aGxtenJzcGhlZnNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTQxMjQsImV4cCI6MjA4ODgzMDEyNH0.MqXGssHfSHkvRDNG2v4zmguXbs0A_HLTAv5-S3C6i0E".trim();
        var _dbClient = null;
        var modo = 'login'; // login, registro, olvido

        // Failsafe: Quitar pantalla azul sí o sí a los 2 segundos
        setTimeout(function() {
            document.getElementById('pantalla-carga').classList.add('hidden');
            if(!_dbClient) document.getElementById('seccion-auth').classList.remove('hidden');
        }, 2000);

        window.onload = function() {
            lucide.createIcons();
            try {
                if (window.supabase && window.supabase.createClient) {
                    _dbClient = window.supabase.createClient(_URL, _KEY);
                    chequearSesion();
                }
            } catch (e) { console.error("Error inicial"); }
        };

        async function chequearSesion() {
            const { data } = await _dbClient.auth.getSession();
            if (data && data.session) {
                entrar(data.session.user.email);
            } else {
                document.getElementById('pantalla-carga').classList.add('hidden');
                document.getElementById('seccion-auth').classList.remove('hidden');
            }
        }

        // --- 2. ACCIÓN PRINCIPAL (SOLUCIONADO) ---
        async function ejecutarAuth() {
            var email = document.getElementById('email').value.trim();
            var pass = document.getElementById('pass').value.trim();
            var empresa = document.getElementById('reg-empresa').value.trim();
            var btn = document.getElementById('btn-main');

            if (!email) return alert("Escribe tu correo");
            if (modo !== 'olvido' && !pass) return alert("Escribe tu contraseña");

            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            try {
                if (modo === 'login') {
                    const { error } = await _dbClient.auth.signInWithPassword({ email: email, password: pass });
                    if (error) throw error;
                    location.reload();
                } 
                else if (modo === 'registro') {
                    if(!empresa) throw new Error("Escribe el nombre de tu empresa");
                    const { data: nE, error: errE } = await _dbClient.from('empresas').insert([{ nombre_empresa: empresa }]).select().single();
                    if (errE) throw errE;
                    const { data: u, error: errU } = await _dbClient.auth.signUp({ email, password: pass });
                    if (errU) throw errU;
                    await _dbClient.from('perfiles').insert([{ id: u.user.id, email: email, rol: 'admin', empresa_id: nE.id }]);
                    alert("Empresa Creada. ¡Inicia Sesión!");
                    location.reload();
                }
                else if (modo === 'olvido') {
                    const { error } = await _dbClient.auth.resetPasswordForEmail(email);
                    if (error) throw error;
                    alert("Enlace de recuperación enviado al correo.");
                    location.reload();
                }
            } catch (err) {
                alert("AVISO: " + (err.message.includes("Invalid login") ? "Correo o contraseña incorrectos" : err.message));
            } finally {
                btn.disabled = false;
                btn.innerText = modo === 'login' ? 'Iniciar Sesión' : modo === 'registro' ? 'Crear Empresa' : 'Enviar Enlace';
            }
        }

        // --- 3. FUNCIONES DE INTERFAZ ---
        function toggleOjo() {
            var p = document.getElementById('pass');
            var i = document.getElementById('icono-ojo');
            if (p.type === "password") {
                p.type = "text";
                i.setAttribute('data-lucide', 'eye-off');
            } else {
                p.type = "password";
                i.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        function cambiarModo(nuevoModo) {
            modo = nuevoModo;
            document.getElementById('div-nombre-emp').className = (modo === 'registro') ? '' : 'hidden';
            document.getElementById('div-pass').className = (modo === 'olvido') ? 'hidden' : '';
            document.getElementById('link-registro').className = (modo === 'login') ? 'text-xs text-blue-400 font-bold cursor-pointer' : 'hidden';
            document.getElementById('link-olvido').className = (modo === 'login') ? 'text-[10px] text-slate-600 cursor-pointer uppercase font-bold tracking-tighter' : 'hidden';
            document.getElementById('link-volver').className = (modo === 'login') ? 'hidden' : 'text-xs text-slate-400 font-bold cursor-pointer underline pt-4 block';
            
            var btn = document.getElementById('btn-main');
            if(modo === 'registro') btn.innerText = "REGISTRAR MI EMPRESA";
            if(modo === 'olvido') btn.innerText = "RECUPERAR MI CUENTA";
            if(modo === 'login') btn.innerText = "INICIAR SESIÓN";
        }

        function entrar(email) {
            document.getElementById('pantalla-carga').classList.add('hidden');
            document.getElementById('seccion-auth').classList.add('hidden');
            document.getElementById('seccion-dash').classList.remove('hidden');
            document.getElementById('txt-bienvenida').innerText = "Has entrado como: " + email;
        }

        function cerrarSesion() { _dbClient.auth.signOut(); location.reload(); }
    </script>
</body>
</html>
