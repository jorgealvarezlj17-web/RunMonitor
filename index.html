<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RunMonitor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0e14; color: #f8fafc; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(22, 26, 35, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden { display: none !important; }
        input { background: #161a23 !important; border: 1px solid #1e293b !important; color: white; outline: none; }
        .btn-yellow { background: #eab308; color: #000; font-weight: 900; }
        .card-shadow { box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="p-loader" class="fixed inset-0 z-[100] bg-[#0b0e14] flex flex-col items-center justify-center">
        <div id="loader-icon" class="p-5 bg-blue-600 rounded-3xl animate-bounce mb-4">
            <i data-lucide="bolt" class="text-white w-10 h-10"></i>
        </div>
        <p id="loader-text" class="text-slate-500 text-[10px] uppercase font-black tracking-[0.3em]">Cargando Sistema...</p>
    </div>

    <div id="scr-auth" class="hidden min-h-screen flex flex-col items-center justify-center p-6">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black italic tracking-tighter">Run<span class="text-blue-500">Monitor</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-1">Industrial Control</p>
        </div>
        <div class="glass p-8 rounded-[40px] w-full max-w-md card-shadow space-y-4">
            <input type="email" id="auth-email" class="w-full p-4 rounded-2xl" placeholder="Correo">
            <input type="password" id="auth-pass" class="w-full p-4 rounded-2xl" placeholder="Contraseña">
            <button onclick="login()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase tracking-widest text-[10px] text-white active:scale-95 transition-all">Entrar</button>
        </div>
    </div>

    <div id="scr-dash" class="hidden min-h-screen p-6 pb-32">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 id="d-emp" class="text-3xl font-black italic tracking-tighter text-white">Mi Planta</h2>
                <p id="d-rol" class="text-blue-500 font-bold uppercase text-[9px] tracking-widest italic">Cargando...</p>
            </div>
            <button onclick="salir()" class="p-4 bg-red-500/10 rounded-2xl text-red-500 border border-red-500/20"><i data-lucide="power" class="w-5 h-5"></i></button>
        </header>
        <div id="lista-equipos" class="grid grid-cols-1 gap-6"></div>
        <button onclick="abrirModal()" class="fixed bottom-10 right-8 bg-yellow-400 p-6 rounded-[30px] shadow-2xl text-black active:scale-90 transition-all"><i data-lucide="plus" class="w-8 h-8 stroke-[3]"></i></button>
    </div>

    <div id="modal-equipo" class="hidden fixed inset-0 z-[80] bg-black/90 backdrop-blur-md flex items-end sm:items-center justify-center p-4">
        <div class="glass w-full max-w-md rounded-[40px] p-8 card-shadow">
            <h2 class="text-2xl font-black italic mb-6">Nuevo Equipo</h2>
            <input type="text" id="new-nom" class="w-full p-4 rounded-2xl mb-4" placeholder="Nombre (Ej: Soplador)">
            <button onclick="guardarEquipo()" class="w-full bg-yellow-400 py-5 rounded-2xl font-black uppercase text-
