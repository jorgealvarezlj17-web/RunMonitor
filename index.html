<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RunMonitor Pro | Multi-Tenant</title>
    
    <!-- Librerías Profesionales -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .block-cajon { background: rgba(255, 255, 255, 0.02); border-radius: 24px; padding: 15px; border: 1px dashed rgba(255,255,255,0.1); }
        .status-led { width: 8px; height: 8px; border-radius: 50%; }
        .led-on { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .led-off { background: #475569; }
        .led-error { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; }
        .hidden { display: none !important; }
        input:focus { border-color: #3b82f6 !important; }
    </style>
</head>
<body>

    <!-- PANTALLA CARGA -->
    <div id="loader" class="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center">
        <i data-lucide="bolt" class="w-12 h-12 text-blue-500 animate-pulse"></i>
    </div>

    <!-- PANTALLA: ACCESO (LOGIN / REGISTRO EMPRESA) -->
    <div id="screen-auth" class="hidden min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-900/20">
                <i data-lucide="zap" class="w-10 h-10 text-white"></i>
            </div>
            <h1 id="auth-title" class="text-4xl font-bold mb-2">RunMonitor</h1>
            <p id="auth-subtitle" class="text-slate-400 mb-8 text-sm">Gestión Industrial para Empresas</p>

            <div class="glass p-8 rounded-3xl space-y-4 text-left">
                <div id="div-empresa" class="hidden">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Nombre de tu Empresa</label>
                    <input type="text" id="reg-empresa" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mt-1 text-white outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Correo</label>
                    <input type="email" id="email" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mt-1 text-white outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Contraseña</label>
                    <div class="relative">
                        <input type="password" id="pass" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mt-1 text-white outline-none">
                        <button onclick="togglePass()" class="absolute right-4 top-1/2 -translate-y-1/2 mt-1 text-slate-500">
                            <i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <button onclick="handleAuth()" id="btn-auth" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-white shadow-lg transition-all">
                    INICIAR SESIÓN
                </button>
                <div class="text-center pt-2 space-y-2">
                    <p onclick="toggleRegisterMode()" id="toggle-text" class="text-sm text-blue-400 cursor-pointer">¿Quieres registrar tu empresa?</p>
                    <p onclick="forgotPassword()" id="forgot-text" class="text-[10px] text-slate-500 cursor-pointer">Olvidé mi contraseña</p>
                </div>
            </div>
        </div>
    </div>

    <!-- PANTALLA: DASHBOARD PRINCIPAL -->
    <div id="screen-dash" class="hidden min-h-screen flex flex-col">
        <header class="p-4 flex justify-between items-center glass sticky top-0 z-50">
            <div class="flex flex-col">
                <h2 id="display-empresa" class="font-bold text-blue-400 text-lg leading-tight">Empresa</h2>
                <span id="display-rol" class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">CARGANDO...</span>
            </div>
            <button onclick="logout()" class="p-2 text-red-500"><i data-lucide="log-out"></i></button>
        </header>

        <!-- Stats -->
        <div class="p-4 grid grid-cols-2 gap-3">
            <div class="glass p-4 rounded-2xl">
                <p class="text-[10px] uppercase font-bold text-slate-500">Equipos Activos</p>
                <h4 id="count-active" class="text-2xl font-bold text-emerald-500">0</h4>
            </div>
            <div class="glass p-4 rounded-2xl">
                <p class="text-[10px] uppercase font-bold text-slate-500">Total Equipos</p>
                <h4 id="count-total" class="text-2xl font-bold text-white">0</h4>
            </div>
        </div>

        <!-- Dashboard Content -->
        <main id="dashboard-content" class="p-4 space-y-6 pb-24">
            <!-- Equipos y categorías cargados por JS -->
        </main>

        <!-- Botón Flotante para Admin -->
        <button id="btn-add" onclick="abrirModalEquipo()" class="hidden fixed bottom-6 right-6 w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center shadow-xl shadow-blue-600/30 z-50">
            <i data-lucide="plus" class="text-white w-8 h-8"></i>
        </button>
    </div>

    <!-- MODAL NUEVO EQUIPO -->
    <div id="modal-equipo" class="hidden fixed inset-0 z-[200] bg-black/80 flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-6 rounded-3xl space-y-4">
            <h3 class="text-xl font-bold">Nuevo Equipo</h3>
            <input type="text" id="new-eq-name" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none" placeholder="Nombre del Equipo">
            <input type="text" id="new-eq-cat" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none" placeholder="Categoría (Opcional)">
            <div class="flex gap-2">
                <button onclick="cerrarModal()" class="flex-1 p-4 rounded-xl bg-slate-800 font-bold">Cancelar</button>
                <button onclick="crearEquipo()" class="flex-1 p-4 rounded-xl bg-blue-600 font-bold">Guardar</button>
            </div>
        </div>
    </div>
