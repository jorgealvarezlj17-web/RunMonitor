<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RunMonitor Pro | Master</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0e14; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(22, 26, 35, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .drawer { background: rgba(255, 255, 255, 0.03); border-radius: 28px; padding: 20px; border: 1px dashed rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .status-led { width: 10px; height: 10px; border-radius: 50%; }
        .led-on { background: #10b981; box-shadow: 0 0 12px #10b981; }
        .led-off { background: #334155; }
        input { background: #161a23 !important; border: 1px solid #1e293b !important; outline: none; color: white; }
    </style>
</head>
<body>

    <!-- PANTALLA CARGA -->
    <div id="loader" class="fixed inset-0 z-[100] bg-[#0b0e14] flex flex-col items-center justify-center">
        <div class="p-4 bg-blue-600 rounded-3xl animate-bounce mb-4 shadow-2xl shadow-blue-500/20">
            <i data-lucide="bolt" class="text-white w-10 h-10"></i>
        </div>
        <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Sincronizando...</p>
    </div>

    <!-- 1. LOGIN / REGISTRO (Diseño Protegido) -->
    <div id="scr-auth" class="hidden min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl font-black mb-1 tracking-tighter italic text-white">Run<span class="text-blue-500">Monitor</span></h1>
        <p class="text-slate-500 mb-8 text-[10px] font-bold uppercase tracking-[0.2em]">Gestión Industrial</p>
        
        <div class="glass p-8 rounded-[40px] w-full max-w-sm space-y-4 text-left shadow-2xl">
            <div id="div-empresa" class="hidden">
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 mb-1 block">Nombre Empresa</label>
                <input type="text" id="reg-empresa" class="w-full p-4 rounded-2xl" placeholder="Ej: Camaronera Mar">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 mb-1 block">Correo</label>
                <input type="email" id="email" class="w-full p-4 rounded-2xl" placeholder="tu@correo.com">
            </div>
            <div id="div-pass">
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 mb-1 block">Contraseña</label>
                <div class="relative">
                    <input type="password" id="pass" class="w-full p-4 rounded-2xl">
                    <button onclick="verPass()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-600">
                        <i data-lucide="eye" id="ojo" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <button onclick="auth()" id="btn-auth" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-xs uppercase tracking-widest">Entrar</button>
            <div class="text-center pt-2 space-y-3">
                <p onclick="toggleModo('reg')" id="txt-reg" class="text-xs text-blue-400 font-bold cursor-pointer">¿Nueva Empresa? Regístrate</p>
                <p onclick="toggleModo('forgot')" id="txt-forgot" class="text-[10px] text-slate-600 font-bold cursor-pointer uppercase">Olvidé mi contraseña</p>
                <p onclick="location.reload()" id="txt-back" class="hidden text-xs text-slate-400 underline cursor-pointer pt-4 block">Volver</p>
            </div>
        </div>
    </div>

    <!-- 2. PANTALLA JORGE (SUPER ADMIN) -->
    <div id="scr-super" class="hidden min-h-screen flex flex-col">
        <header class="p-6 glass flex justify-between items-center sticky top-0 z-50">
            <h2 class="font-black text-blue-500 text-xs tracking-[0.3em] uppercase">Control Maestro (Jorge)</h2>
            <button onclick="logout()" class="text-red-500"><i data-lucide="power"></i></button>
        </header>
        <main id="super-content" class="p-6 space-y-4">
            <!-- Lista de empresas clientes -->
        </main>
    </div>

    <!-- 3. PANTALLA DASHBOARD (ADMIN / OPERADOR) -->
    <div id="scr-dash" class="hidden min-h-screen flex flex-col">
        <header class="p-6 glass flex justify-between items-center sticky top-0 z-50">
            <div>
                <h2 id="disp-empresa" class="font-black text-white italic text-xl">Empresa</h2>
                <p id="disp-rol" class="text-[9px] text-blue-500 font-bold uppercase tracking-widest">Rol</p>
            </div>
            <button onclick="logout()" class="text-red-500"><i data-lucide="power"></i></button>
        </header>

        <!-- Panel Admin para agregar correos -->
        <div id="panel-admin-tools" class="hidden p-6 pb-0">
            <div class="glass p-5 rounded-[32px] border border-blue-500/10 space-y-3">
                <h3 class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Autorizar Trabajador</h3>
                <div class="flex gap-2">
                    <input type="email" id="inv-email" class="flex-1 p-3 rounded-xl text-xs" placeholder="Email del operador">
                    <button onclick="invitar()" class="bg-blue-600 px-4 rounded-xl text-[10px] font-bold uppercase">Añadir</button>
                </div>
            </div>
        </div>

        <main id="dash-content" class="p-6 space-y-6">
            <!-- Equipos aquí -->
        </main>

        <button id="btn-add-float" onclick="abrirModal()" class="hidden fixed bottom-8 right-8 w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center shadow-2xl shadow-blue-600/40 z-50">
            <i data-lucide="plus" class="text-white w-8 h-8"></i>
        </button>
    </div>

    <!-- MODAL NUEVO EQUIPO -->
    <div id="modal-eq" class="hidden fixed inset-0 z-[200] bg-black/90 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-8 rounded-[40px] space-y-5 text-center">
            <h3 class="text-xl font-black italic">Nuevo Equipo</h3>
            <input type="text" id="new-name" class="w-full p-4 rounded-2xl" placeholder="Nombre (Ej: Bomba #1)">
            <input type="text" id="new-cat" class="w-full p-4 rounded-2xl" placeholder="Cajón / Bloque">
            <div class="flex gap-3 pt-2">
                <button onclick="cerrarModal()" class="flex-1 py-4 font-bold text-slate-500">Cerrar</button>
                <button onclick="crearEquipo()" class="flex-1 py-4 bg-blue-600 rounded-2xl font-black">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        var _U = "https://yfsyeziyhlmzrsphefss.supabase.co".trim();
        var _K = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlmc3lleml5aGxtenJzcGhlZnNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTQxMjQsImV4cCI6MjA4ODgzMDEyNH0.MqXGssHfSHkvRDNG2v4zmguXbs0A_HLTAv5-S3C6i0E".trim();
        var _db = window.supabase.createClient(_U, _K);
        var curModo = 'login';
        var miPerfil = null;

        window.onload = async () => {
            lucide.createIcons();
            var { data: { session } } = await _db.auth.getSession();
            setTimeout(() => { document.getElementById('loader').classList.add('hidden'); }, 1500);
            if (session) cargarPerfil(session.user.id);
            else document.getElementById('scr-auth').classList.remove('hidden');
        };

        async function cargarPerfil(uid) {
            const { data } = await _db.from('perfiles').select('*, empresas(*)').eq('id', uid).single();
            if(!data) return logout();
            miPerfil = data;

            if (data.rol === 'super_admin') {
                document.getElementById('scr-super').classList.remove('hidden');
                renderSuper();
            } else {
                document.getElementById('scr-dash').classList.remove('hidden');
                document.getElementById('disp-empresa').innerText = data.empresas.nombre_empresa;
                document.getElementById('disp-rol').innerText = data.rol;
                if(data.rol === 'admin') {
                    document.getElementById('panel-admin-tools').classList.remove('hidden');
                    document.getElementById('btn-add-float').classList.remove('hidden');
                }
                renderEquipos();
            }
        }

        async function renderSuper() {
            const { data } = await _db.from('empresas').select('*, perfiles(count), equipos(count)');
            document.getElementById('super-content').innerHTML = data.map(e => `
                <div class="glass p-6 rounded-[32px] space-y-3">
                    <h3 class="font-black text-blue-400 italic text-xl">${e.nombre_empresa}</h3>
                    <div class="flex gap-4 text-[10px] text-slate-500 font-black uppercase">
                        <span>👥 ${e.perfiles[0].count} Usuarios</span>
                        <span>⚙️ ${e.equipos[0].count} Equipos</span>
                    </div>
                </div>
            `).join('');
        }

        async function renderEquipos() {
            const { data } = await _db.from('equipos').select('*').eq('empresa_id', miPerfil.empresa_id);
            const cont = document.getElementById('dash-content');
            cont.innerHTML = "";
            const cats = [...new Set(data.map(e => e.categoria))];
            
            if(data.length === 0) cont.innerHTML = `<p class="text-center text-slate-700 py-20 font-bold uppercase text-[10px] tracking-widest">Sin equipos registrados</p>`;

            cats.forEach(c => {
                const draw = document.createElement('div');
                draw.className = "drawer glass";
                draw.innerHTML = `<h4 class="text-[9px] font-black text-slate-600 uppercase tracking
